server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Redirect root to /quit/
    location = / {
        return 301 /quit/;
    }

    # Main application location
    location /quit/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /quit/index.html;

        # Mitigate QUIC/HTTP3 issues by clearing Alt-Svc if it's causing failures
        add_header Alt-Svc 'clear';
        
        # Security headers
        add_header X-Content-Type-Options "nosniff";
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.mantracare.com;";

        # Asset caching
        location ~* \.(?:css|js|map|json|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Alt-Svc 'clear';
            access_log off;
        }
    }

    # Error handling
    error_page 404 /quit/index.html;
}
