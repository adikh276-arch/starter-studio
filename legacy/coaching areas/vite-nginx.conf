server {
    listen 80;
    absolute_redirect off;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /coach/index.html;
    }
    error_page 404 /coach/index.html;

    location = / {
        return 301 /coach/;
    }

    # Redirect /app/coach to /coach for backwards compatibility
    location ~ ^/app/coach(/.*)?$ {
        return 301 /coach$1;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
